name: Java Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'java-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'java-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test
